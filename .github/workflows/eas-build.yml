name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
  push:
    branches:
      - eas-build-trigger

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: expo
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: expo
        run: |
          PROFILE=${{ github.event.inputs.profile || 'production' }}
          PLATFORM=${{ github.event.inputs.platform || 'android' }}
          eas build --profile $PROFILE --platform $PLATFORM --non-interactive
